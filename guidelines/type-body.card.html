<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-ui); padding: 28px; }
  .eyebrow { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: var(--tracking-caps); color: var(--green-primary); margin-bottom: 10px; }
  .lead { font-size: var(--text-md); color: var(--text-body); line-height: var(--leading-normal); max-width: 56ch; }
  .body { font-size: var(--text-base); color: var(--text-muted); line-height: var(--leading-relaxed); max-width: 60ch; margin-top: 12px; }
  .label { font-size: var(--text-sm); color: var(--text-faint); margin-top: 14px; font-weight: var(--fw-medium); }
</style>
</head>
<body>
  <div class="eyebrow">Inference, metered</div>
  <p class="lead">Spin up an endpoint, point your SDK at it, and pay only for the tokens you use.</p>
  <p class="body">Helix runs your models on dedicated GPUs with autoscaling built in. No cluster to babysit, no idle bill — prepaid token balance draws down as requests complete.</p>
  <div class="label">15px body · 17px lead · 13px labels</div>
</body>
</html>
