<!-- @dsCard group="Type" viewport="700x230" name="Display — Space Grotesk" subtitle="Headlines & hero copy, tight tracking, bold" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-display); color: var(--text-strong); padding: 28px; }
  .d1 { font-size: 56px; font-weight: 700; letter-spacing: var(--tracking-tight); line-height: 1.0; }
  .d2 { font-size: 34px; font-weight: 700; letter-spacing: var(--tracking-snug); line-height: 1.1; margin-top: 14px; }
  .grad { background: linear-gradient(100deg, var(--green-primary), var(--green-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .cap { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: var(--tracking-caps); margin-top: 18px; }
</style>
</head>
<body>
  <div class="d1">Deploy models <span class="grad">at the speed of thought</span></div>
  <div class="d2">Prepaid tokens. Zero ops.</div>
  <div class="cap">Space Grotesk · 700 · −0.02em</div>
</body>
</html>
