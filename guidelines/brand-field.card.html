<!-- @dsCard group="Brand" viewport="700x220" name="Background field" subtitle="Near-black base with faint bio-grid dots and a low green glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; font-family: var(--font-display); }
  .field {
    height: 220px; position: relative; overflow: hidden;
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(74,222,128,0.12), transparent 55%),
      radial-gradient(var(--grid-dot) 1.4px, transparent 1.4px),
      var(--bg-0);
    background-size: auto, 22px 22px, auto;
    display: flex; align-items: center; padding: 0 40px;
  }
  .h { color: var(--text-strong); font-size: 34px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; max-width: 18ch; }
  .h em { font-style: normal; background: linear-gradient(100deg, var(--green-primary), var(--green-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .glowline { position: absolute; right: -60px; top: -60px; width: 240px; height: 240px; border-radius: 50%; background: radial-gradient(circle, rgba(74,222,128,0.22), transparent 65%); filter: blur(8px); }
</style>
</head>
<body>
  <div class="field">
    <div class="glowline"></div>
    <div class="h">The platform for <em>shipping intelligence</em></div>
  </div>
</body>
</html>
