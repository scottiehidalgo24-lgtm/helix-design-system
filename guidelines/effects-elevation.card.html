<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation & glow" subtitle="Dark shadows for depth, neon glow for active accents" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-mono); color: var(--text-faint); padding: 30px; }
  .row { display: flex; gap: 22px; align-items: center; }
  .cell { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 110px; height: 64px; background: var(--surface-card); border: var(--border-card); border-radius: var(--radius-md); }
  .lbl { font-size: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">shadow-sm</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">shadow-md</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">shadow-lg</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--glow-md);border-color:var(--green-line)"></div><span class="lbl">glow-md</span></div>
    <div class="cell"><div class="box" style="box-shadow:var(--ring);border-color:var(--green-primary)"></div><span class="lbl">focus ring</span></div>
  </div>
</body>
</html>
