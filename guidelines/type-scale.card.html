<!-- @dsCard group="Type" viewport="700x250" name="Type scale" subtitle="Modular scale from caption to hero" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-display); color: var(--text-strong); padding: 22px 28px; }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--ink-700); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 70px; flex: none; text-transform: uppercase; letter-spacing: 0.06em; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--green-primary); margin-left: auto; flex: none; }
  .s { font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; }
</style>
</head>
<body>
  <div class="row"><span class="tag">5xl</span><span class="s" style="font-size:44px">Helix</span><span class="spec">62 / 700</span></div>
  <div class="row"><span class="tag">3xl</span><span class="s" style="font-size:32px">Deploy in seconds</span><span class="spec">38 / 700</span></div>
  <div class="row"><span class="tag">xl</span><span class="s" style="font-size:24px">Metered inference</span><span class="spec">24 / 700</span></div>
  <div class="row"><span class="tag">md</span><span class="s" style="font-size:17px;font-weight:500">Endpoint settings</span><span class="spec">17 / 500</span></div>
  <div class="row"><span class="tag">base</span><span class="s" style="font-size:15px;font-weight:400">Pay only for tokens used</span><span class="spec">15 / 400</span></div>
</body>
</html>
