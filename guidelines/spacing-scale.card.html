<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-mono); color: var(--text-muted); padding: 26px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .cell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: var(--green-soft); border: 1px solid var(--green-line); border-radius: var(--radius-xs); width: 26px; }
  .lbl { font-size: 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height:4px"></div><span class="lbl">1·4</span></div>
    <div class="cell"><div class="bar" style="height:8px"></div><span class="lbl">2·8</span></div>
    <div class="cell"><div class="bar" style="height:12px"></div><span class="lbl">3·12</span></div>
    <div class="cell"><div class="bar" style="height:16px"></div><span class="lbl">4·16</span></div>
    <div class="cell"><div class="bar" style="height:24px"></div><span class="lbl">6·24</span></div>
    <div class="cell"><div class="bar" style="height:32px"></div><span class="lbl">8·32</span></div>
    <div class="cell"><div class="bar" style="height:48px"></div><span class="lbl">12·48</span></div>
    <div class="cell"><div class="bar" style="height:64px"></div><span class="lbl">16·64</span></div>
  </div>
</body>
</html>
